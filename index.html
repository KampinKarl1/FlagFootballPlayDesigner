<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Play Designer</title>
<style>
body {
    margin: 0;
    display: flex;
    height: 100vh;
    font-family: sans-serif;
}
#sidebar {
    width: 120px;
    background: #222;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding-top: 20px;
    gap: 15px;
}
#canvas-container {
    flex: 1;
    position: relative;
    display: flex;
    justify-content: center;
    align-items: center;
    background: #f0f0f0;
}
canvas { border: none; }
button, input {
    position: fixed;
    left: 50%;
    transform: translateX(-50%);
    width: 200px;
    height: 50px;
    background: #444;
    color: white;
    border: none;
    font-size: 18px;
    cursor: pointer;
    border-radius: 8px;
    text-align: center;
}
#clear-btn { bottom: 10px; }
#export-png-btn { bottom: 70px; }
#save-btn { bottom: 130px; }
#load-btn { bottom: 190px; }
#play-select { position: fixed; bottom: 250px; left: 50%; transform: translateX(-50%); width: 220px; display: none; }
#play-name { position: fixed; bottom: 310px; left: 50%; transform: translateX(-50%); width: 200px; height: 30px; font-size: 16px; }
#hint { position: fixed; top: 20px; left: 50%; transform: translateX(-50%); color: white; font-weight: bold; background: rgba(0,0,0,0.7); padding: 5px 10px; border-radius: 5px; display: none; }
</style>
</head>
<body>

<div id="sidebar"></div>
<div id="canvas-container">
    <canvas id="field"></canvas>
</div>

<div id="hint"></div>

<input id="play-name" placeholder="Enter Play Name">
<button id="clear-btn">Clear Selected Player Route</button>
<button id="export-png-btn">Export as PNG</button>
<button id="save-btn">Save Play</button>
<button id="load-btn">Load Play</button>
<select id="play-select" onblur="selectPlay()"></select>
<input type="file" id="file-input" accept=".json" style="display:none">

<script>
const canvas = document.getElementById("field");
const ctx = canvas.getContext("2d");
const sidebar = document.getElementById("sidebar");
const clearBtn = document.getElementById("clear-btn");
const exportPNGBtn = document.getElementById("export-png-btn");
const saveBtn = document.getElementById("save-btn");
const loadBtn = document.getElementById("load-btn");
const fileInput = document.getElementById("file-input");
const playSelect = document.getElementById("play-select");
const playNameInput = document.getElementById("play-name");
const hint = document.getElementById("hint");

canvas.width = 900;
canvas.height = 600;
const gridSpacing = 10;

let currentSnap = { x: null, y: null };
let activePlayer = "X";
let flashPlayer = null;
let flashTimeout = null;
let routeFinished = false;
let lastClickTime = 0;

// In-memory loaded plays
let loadedPlays = {};

// ----------------------
// Players & UI
// ----------------------
const players = {
    "X": { color: "red", route: [], finished: false },
    "Y": { color: "black", route: [], finished: false },
    "Z": { color: "blue", route: [], finished: false },
    "C": { color: "green", route: [], finished: false },
    "QB": { color: "purple", route: [], finished: false }
};

function createPlayerButton(name, color) {
    const btn = document.createElement("div");
    btn.innerText = name;
    btn.style.width = "60px";
    btn.style.height = "60px";
    btn.style.borderRadius = "50%";
    btn.style.background = color;
    btn.style.display = "flex";
    btn.style.justifyContent = "center";
    btn.style.alignItems = "center";
    btn.style.color = "white";
    btn.style.fontWeight = "bold";
    btn.style.cursor = "pointer";
    btn.style.border = "3px solid white";

    btn.onclick = () => {
        activePlayer = name;
        routeFinished = false;
        players[name].finished = false;

        flashPlayer = name;
        clearTimeout(flashTimeout);
        flashTimeout = setTimeout(() => { flashPlayer = null; draw(); }, 250);

        updateActiveHighlight();
        draw();
    };

    sidebar.appendChild(btn);
}

function createAddButton() {
    const btn = document.createElement("div");
    btn.innerHTML = "+";
    btn.style.width = "60px";
    btn.style.height = "60px";
    btn.style.borderRadius = "50%";
    btn.style.border = "3px dashed white";
    btn.style.color = "white";
    btn.style.display = "flex";
    btn.style.justifyContent = "center";
    btn.style.alignItems = "center";
    btn.style.fontSize = "30px";
    btn.style.cursor = "pointer";
    sidebar.appendChild(btn);
}

function updateActiveHighlight() {
    [...sidebar.children].forEach(c => { c.style.outline = c.innerText===activePlayer?"4px solid yellow":"none"; });
}

for (let name in players) createPlayerButton(name, players[name].color);
createAddButton();
updateActiveHighlight();

// ----------------------
// Drawing
// ----------------------
canvas.addEventListener("contextmenu", e=>e.preventDefault());
function snapToGrid(v){return Math.round(v/gridSpacing)*gridSpacing;}
function drawArrowhead(from,to,color){
    const size=12;
    const angle=Math.atan2(to.y-from.y,to.x-from.x);
    ctx.fillStyle=color;
    ctx.beginPath();
    ctx.moveTo(to.x,to.y);
    ctx.lineTo(to.x-size*Math.cos(angle-Math.PI/6),to.y-size*Math.sin(angle-Math.PI/6));
    ctx.lineTo(to.x-size*Math.cos(angle+Math.PI/6),to.y-size*Math.sin(angle+Math.PI/6));
    ctx.closePath(); ctx.fill();
}

function drawRoute(route,color,flash=false,finished=false){
    if(route.length<1) return;
    if(route.length>1){
        ctx.beginPath();
        ctx.moveTo(route[0].x,route[0].y);
        for(let i=1;i<route.length;i++) ctx.lineTo(route[i].x,route[i].y);
        if(flash){ctx.strokeStyle="white";ctx.lineWidth=10;ctx.stroke();}
        ctx.strokeStyle=color;ctx.lineWidth=3;ctx.stroke();
        if(finished) drawArrowhead(route[route.length-2],route[route.length-1],color);
    }
    ctx.fillStyle=color;
    const limit=finished?route.length-1:route.length;
    for(let i=0;i<limit;i++){
        const v=route[i];
        ctx.beginPath(); ctx.arc(v.x,v.y,5,0,Math.PI*2); ctx.fill();
    }
}

function draw(){
    ctx.clearRect(0,0,canvas.width,canvas.height);
    ctx.lineWidth=8; ctx.strokeStyle="black"; ctx.strokeRect(0,0,canvas.width,canvas.height);

    ctx.fillStyle="#bbb";
    for(let x=0;x<=canvas.width;x+=gridSpacing)
        for(let y=0;y<=canvas.height;y+=gridSpacing){
            ctx.beginPath();ctx.arc(x,y,1,0,Math.PI*2);ctx.fill();
        }

    for(let name in players){
        const p=players[name];
        drawRoute(p.route,p.color,name===flashPlayer,p.finished);
    }

    const activeRoute=players[activePlayer].route;
    if(!routeFinished && activeRoute.length>0 && currentSnap.x!==null){
        const last=activeRoute[activeRoute.length-1];
        ctx.setLineDash([6,6]); ctx.strokeStyle=players[activePlayer].color; ctx.lineWidth=2;
        ctx.beginPath(); ctx.moveTo(last.x,last.y); ctx.lineTo(currentSnap.x,currentSnap.y); ctx.stroke();
        ctx.setLineDash([]);
    }

    if(currentSnap.x!==null && !routeFinished){
        ctx.fillStyle=players[activePlayer].color;
        ctx.beginPath(); ctx.arc(currentSnap.x,currentSnap.y,6,0,Math.PI*2); ctx.fill();
    }

    if(routeFinished){
        ctx.fillStyle="rgba(0,0,0,0.7)";
        ctx.font="20px sans-serif";
        ctx.textAlign="center";
        ctx.fillText("Route finished — select a player to draw again",canvas.width/2,40);
    }
}

// ----------------------
// Mouse Events
// ----------------------
canvas.addEventListener("mousemove",e=>{
    const rect=canvas.getBoundingClientRect();
    currentSnap.x=snapToGrid(e.clientX-rect.left);
    currentSnap.y=snapToGrid(e.clientY-rect.top);
    draw();
});

canvas.addEventListener("mousedown",e=>{
    const now=Date.now();
    if(now-lastClickTime<250) return;
    lastClickTime=now;
    if(routeFinished) return;
    const route=players[activePlayer].route;
    if(e.button===0) route.push({x:currentSnap.x,y:currentSnap.y});
    else if(e.button===2 && route.length>0) route.pop();
    draw();
});

canvas.addEventListener("dblclick",()=>{
    const route=players[activePlayer].route;
    if(route.length>1){ routeFinished=true; players[activePlayer].finished=true; draw(); }
});

// ----------------------
// Buttons
// ----------------------
clearBtn.addEventListener("click",()=>{
    players[activePlayer].route=[];
    players[activePlayer].finished=false;
    routeFinished=false;
    draw();
});

// PNG export
exportPNGBtn.addEventListener("click",()=>{
    try{
        const dataURL=canvas.toDataURL("image/png");
        const link=document.createElement("a"); link.href=dataURL;
        link.download=`play_${activePlayer}.png`;
        document.body.appendChild(link); link.click(); document.body.removeChild(link);
    }catch(err){ alert("Failed to export PNG: "+err.message); }
});

// Save play
saveBtn.addEventListener("click",()=>{
    const name = playNameInput.value.trim();
    if(!name){ alert("Please enter a play name."); return; }
    try{
        for(let p in players) players[p].finished = true;
        const jsonStr = JSON.stringify({playName:name, players},null,2);
        const blob = new Blob([jsonStr],{type:"application/json"});
        const link = document.createElement("a");
        link.href = URL.createObjectURL(blob);
        link.download = `${name}.json`;
        document.body.appendChild(link); link.click(); document.body.removeChild(link);

        // Successful save actions
        for(let p in players){ players[p].route=[]; players[p].finished=false; }
        playNameInput.value = "";
        loadedPlays[name] = JSON.parse(jsonStr).players;
        updatePlayList();
        showHint("Play saved successfully!");
        draw();
    }catch(err){
        alert("Failed to save play: "+err.message);
    }
});

function showHint(msg){
    hint.innerText = msg;
    hint.style.display = "block";
    setTimeout(()=>{ hint.style.display = "none"; },500);
}

// ----------------------
// Load Play
// ----------------------
loadBtn.addEventListener("click",()=>fileInput.click());
fileInput.addEventListener("change",e=>{
    const file=e.target.files[0];
    if(!file) return;
    const reader=new FileReader();
    reader.onload=ev=>{
        try{
            const obj=JSON.parse(ev.target.result);
            const playName=obj.playName||file.name;
            loadedPlays[playName]=obj.players;
            updatePlayList();
        }catch(err){
            alert("Invalid JSON file for this app.");
        }
    };
    reader.readAsText(file);
});

function updatePlayList(){
    playSelect.innerHTML="";
    for(let name in loadedPlays){
        const opt=document.createElement("option");
        opt.value=name; opt.innerText=name; playSelect.appendChild(opt);
    }
    playSelect.style.display=Object.keys(loadedPlays).length>0?"block":"none";
}

function selectPlay (){
    const name = playSelect.value;
    if (!name) return;

    const data = loadedPlays[name];
    for(let p in players){
        players[p].route = data[p]?.route || [];
        players[p].finished = true;
    }
    draw();
};

playSelect.addEventListener("change",()=>{
    const name=playSelect.value;
    if(!name) return;
    const data=loadedPlays[name];
    for(let p in players){
        players[p].route=data[p]?.route || [];
        players[p].finished=data[p]?.finished || false;
    }
    routeFinished=false;
    draw();
});

draw();
</script>
</body>
</html>
